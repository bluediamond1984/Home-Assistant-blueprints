blueprint:
  name: Roborock Multi Level
  description: Create single level script with room numbers
  author: BlueDiamond
  domain: script
  homeassistant:
    min_version: 2026.2.0

  input:
    map:
      name: Floor entity
      description: The floor entity to select the floor level
      selector:
        entity:
          filter:
            integration: roborock
            domain: select
    map_name:
      name: Floor name
      description: The floorname corresponding to the room numbers
      selector:
        text:
    room_id:
      name: Room numbers
      description: |
        List of areas on this floor to populate the selector entity:
        \- label: <name>
        &nbsp;&nbsp;value: <area_name>
        Map vacuum segments to areas for the vacuum entity. 
      selector:
        object:
    vacuum_id:
      name: Vacuum target
      description: What should this service use as targeted entity
      selector:
        entity:
          filter:
            domain: vacuum
    vacuum_mop_intensity_id:
      name: Mop intensity
      description: Entity for mopping
      selector:
        entity:
          filter:
            integration: roborock
            domain: select
    vacuum_mop_mode_id:
      name: Mop mode
      description: Entity for mop mode
      selector:
        entity:
          filter:
            integration: roborock
            domain: select

mode: restart
max_exceeded: silent

fields:
  rooms:
    name: Area
    description: Select rooms to clean
    selector:
      select:
        options: !input room_id
        multiple: true
    required: true
  fan_speed:
    name: Vacuum intensity
    description: Set suction power (default = balanced)
    selector:
      select:
        options:
          - label: "Off"
            value: "off"
          - label: Quiet
            value: quiet
          - label: Balanced
            value: balanced
          - label: Turbo
            value: turbo
          - label: Max
            value: max
          - label: Custom
            value: custom
          - label: Max plus
            value: max plus
        mode: dropdown
    default: balanced
    required: true
  mop:
    name: Mop intensity
    description: Set mop intensity (default = off)
    selector:
      select:
        options:
          - label: "Off"
            value: "off"
          - label: Low
            value: low
          - label: Medium
            value: medium
          - label: High
            value: high
        mode: dropdown
    default: "off"
    required: true
  mop_mode:
    name: Mop mode
    description: How hard you would like your vacuum to mop
    selector:
      select:
        options:
          - label: Standard
            value: standard
          - label: Deep
            value: deep
          - label: Deep+
            value: deep_plus
          - label: Fast
            value: fast
        mode: dropdown
    required: false

sequence:
  - alias: Stop when no room is selected
    if:
      - condition: template
        value_template: "{{ rooms == null }}"
    then:
      - action: system_log.write
        data:
          level: warning
          message: No room selected
          logger: Roborock multi level script
      - stop: No room selected
  - alias: Define default values
    variables:
      fan_speed: |
        {% if fan_speed == null %}
          balanced
        {% else %}
          {{ fan_speed }}
        {% endif %}
      mop: |
        {% if mop == null %}
          off
        {% else %}
          {{ mop }}
        {% endif %}
  - alias: Load floormap
    action: select.select_option
    target:
      entity_id: !input map
    data:
      option: !input map_name
    continue_on_error: true
  - alias: Delay for loading floormap Roborock
    delay:
      hours: 0
      minutes: 0
      seconds: 6
      milliseconds: 0
  - alias: Set mop intensity
    action: select.select_option
    target:
      entity_id: !input vacuum_mop_intensity_id
    data:
      option: "{{ mop }}"
  - alias: Only set mop_mode when selected
    if:
      - condition: template
        value_template: "{{ mop_mode != null }}"
    then:
      - alias: Set mop_mode user input
        action: select.select_option
        target:
          entity_id: !input vacuum_mop_mode_id
        data:
          option: "{{ mop_mode }}"
  - alias: Set fan speed
    action: vacuum.set_fan_speed
    target:
      entity_id: !input vacuum_id
    data:
      fan_speed: "{{ fan_speed }}"
  - alias: Clean selected rooms
    action: vacuum.clean_area
    target:
      entity_id: vacuum.rocky
    data:
      cleaning_area_id: |-
        {% set output = namespace(list=[]) %}
        {% for room in rooms %}
        {% set output.list = output.list + [area_id(room)] %}
        {%- endfor %}
        {{ output.list }}